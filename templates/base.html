<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CyberSim{% endblock %} | Cybersecurity Simulator</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">
            <span class="nav-logo">&gt;_</span>
            <span class="nav-title">CyberSim</span>
            <span class="nav-version">v1.0</span>
        </div>
        <div class="nav-links">
            <a href="/" class="nav-link {% if request.url.path == '/' %}active{% endif %}">
                <span class="nav-icon">&#9632;</span> Dashboard
            </a>
            <a href="/vulnerabilities" class="nav-link {% if request.url.path == '/vulnerabilities' %}active{% endif %}">
                <span class="nav-icon">&#9888;</span> Vulnerabilities
            </a>
            <a href="/scenarios" class="nav-link {% if request.url.path == '/scenarios' %}active{% endif %}">
                <span class="nav-icon">&#9760;</span> Scenarios
            </a>
            <a href="/assets" class="nav-link {% if request.url.path == '/assets' %}active{% endif %}">
                <span class="nav-icon">&#9881;</span> Assets
            </a>
            <a href="/about" class="nav-link {% if request.url.path == '/about' %}active{% endif %}">
                <span class="nav-icon">&#9432;</span> About
            </a>
            <a href="/docs" class="nav-link" target="_blank">
                <span class="nav-icon">&#128462;</span> API
            </a>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-content">
            <span class="footer-brand">&gt;_ CyberSim</span>
            <span class="footer-sep">|</span>
            <span>Cybersecurity Attack Scenario Simulator</span>
            <span class="footer-sep">|</span>
            <span class="footer-status"><span class="status-dot"></span> System Operational</span>
        </div>
    </footer>

    <script src="/static/js/main.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
